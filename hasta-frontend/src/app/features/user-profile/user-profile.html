@if (user(); as u) {
  <section class="profile">
    <h1>{{ u.name }} {{ u.surname }}</h1>
    <dl>
      <dt>Username</dt>
      <dd>{{ u.username }}</dd>
      <dt>Email</dt>
      <dd>{{ u.email }}</dd>
      <dt>Credito</dt>
      <dd>{{ u.balance }} &euro;</dd>
    </dl>
  </section>
} @else {
  <p class="status">Caricamento profilo...</p>
}
