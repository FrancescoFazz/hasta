<app-category-bar />

<div class="category-header">
  @if (categoryInfo(); as info) {
    <span class="category-header-icon">
      <app-category-icon [icon]="info.icon" [size]="28" />
    </span>
    <h1>{{ info.label }}</h1>
  } @else {
    <h1>{{ category() }}</h1>
  }
</div>

@if (loading()) {
  <p class="status">Caricamento...</p>
} @else if (auctions().length === 0) {
  <p class="status">Nessuna asta in questa categoria.</p>
} @else {
  <div class="auction-grid">
    @for (auction of auctions(); track auction.id) {
      <app-auction-card [auction]="auction" />
    }
  </div>
}
