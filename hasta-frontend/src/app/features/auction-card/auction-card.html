@if (active()) {
  <a class="auction-card" [routerLink]="['/aste', auction().id]">
    <ng-container *ngTemplateOutlet="content" />
  </a>
} @else {
  <div class="auction-card inactive" aria-disabled="true">
    <ng-container *ngTemplateOutlet="content" />
  </div>
}

<ng-template #content>
  <span class="status-pill" [class.status-live]="active()" [class.status-closed]="!active()">
    @if (active()) {
      <span class="pulse-dot"></span>{{ remaining() }}
    } @else {
      Conclusa
    }
  </span>

  <div class="lot-art">
    <app-category-icon [icon]="categoryInfo()?.icon ?? 'box'" [size]="56" />
  </div>

  <div class="lot-body">
    <span class="lot-category">{{ categoryInfo()?.label ?? auction().product.category }}</span>
    <h3 class="lot-title">{{ auction().product.name }}</h3>
    <span class="lot-price">{{ formattedPrice() }}</span>
  </div>
</ng-template>
