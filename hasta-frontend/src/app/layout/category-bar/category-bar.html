<nav class="category-bar" aria-label="Categorie">
  @for (category of categories; track category.id) {
    <a
      class="category-item"
      [routerLink]="['/categoria', category.id]"
      routerLinkActive="active"
      [title]="category.label"
    >
      <app-category-icon [icon]="category.icon" />
      <span class="category-tooltip">{{ category.label }}</span>
    </a>
  }
</nav>
