<header class="site-header">
  <a class="site-name" routerLink="/">Hasta</a>

  @if (isLoggedIn()) {
    <div class="profile-menu">
      <button
        class="profile-trigger"
        type="button"
        (click)="toggleMenu()"
        [class.open]="menuOpen()"
        aria-haspopup="true"
        [attr.aria-expanded]="menuOpen()"
      >
        @if (user(); as u) {
          <span class="avatar">{{ u.name.charAt(0) }}{{ u.surname.charAt(0) }}</span>
          <span class="username">{{ u.username }}</span>
        } @else {
          <span class="avatar">?</span>
        }
        <svg
          class="chevron"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.8"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M6 9l6 6 6-6" />
        </svg>
      </button>

      @if (menuOpen()) {
        <div class="menu-backdrop" (click)="closeMenu()"></div>

        <div class="dropdown" role="menu">
          <a class="dropdown-item" routerLink="/utente" (click)="closeMenu()" role="menuitem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <circle cx="12" cy="8" r="3.2" />
              <path d="M5 20c1.2-3.8 4-5.8 7-5.8s5.8 2 7 5.8" />
            </svg>
            <span>Profilo</span>
          </a>
          <button type="button" class="dropdown-item dropdown-item--button" (click)="logout()" role="menuitem">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="1.6"
              stroke-linecap="round"
              stroke-linejoin="round"
              aria-hidden="true"
            >
              <path d="M15 4H8a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h7" />
              <path d="M11 12h9M17 8l4 4-4 4" />
            </svg>
            <span>Esci</span>
          </button>
        </div>
      }
    </div>
  } @else {
    <a class="login-link" routerLink="/login">Accedi</a>
  }
</header>
