services:
  db:
    image: mysql:8
    environment:
      MYSQL_DATABASE: hasta
      MYSQL_USER: hasta
      MYSQL_PASSWORD: hasta
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"

  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/hasta
      SPRING_DATASOURCE_USERNAME: hasta
      SPRING_DATASOURCE_PASSWORD: hasta
    depends_on:
      - db